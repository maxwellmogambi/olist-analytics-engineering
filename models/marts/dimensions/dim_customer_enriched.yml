version: 2

models:
  - name: dim_customer_enriched
    description: "This model is an enriched dimension table for customers data, combining customer information with order metrics."
    columns:
      - name: customer_id
        description: "Unique identifier for each customer."
        data_tests:
          - not_null
          - unique
      
      - name: total_orders
        description: "Total number of orders placed by the customer."

      - name: lifetime_revenue
        description: "Total revenue generated by the customer across all orders."

      - name: first_order_at
        description: "Date of the customer's first order."

      - name: latest_order_at
        description: "Date of the customer's most recent order."      

