version: 2

models:
  - name: dim_sellers_enriched
    description: "Seller dimension enriched with seller performance metrics."
    columns:
      - name: seller_id
        description: "Unique seller identifier."
        data_tests:
          - not_null
          - unique
      - name: seller_zip_code_prefix
        description: "Seller ZIP code prefix."
      - name: seller_city
        description: "Seller city."
      - name: seller_state
        description: "Seller state."
      - name: units_sold
        description: "Total units sold by the seller."
      - name: order_count
        description: "Distinct orders fulfilled by the seller."
      - name: product_count
        description: "Distinct products sold by the seller."
      - name: total_revenue
        description: "Revenue generated by the seller."
      - name: avg_order_value
        description: "Average revenue per order for the seller."
