version: 2

models:
  - name: int_seller_performance
    description: "This model aggregates seller performance metrics, including total units sold, order count, product count, total revenue, and average order value."

    columns:
      - name: seller_id
        description: "Unique seller identifier."
        data_tests:
          - unique
          - not_null

      - name: units_sold
        description: "Total units sold."

      - name: order_count
        description: "Distinct orders fulfilled."

      - name: product_count
        description: "Distinct products sold."

      - name: total_revenue
        description: "Revenue generated by seller."

      - name: avg_order_value
        description: "Average revenue per order."