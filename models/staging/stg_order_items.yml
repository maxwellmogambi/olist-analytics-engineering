version: 2

models:
  - name: stg_order_items
    description: "Cleaned staging model containing order line items from the Olist marketplace."

    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - order_id
              - order_item_id

    columns:
      - name: order_id
        description: "Unique identifier of the order."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_id

      - name: order_item_id
        description: "Sequential identifier of an item within an order."
        data_tests:
          - not_null

      - name: product_id
        description: "Unique identifier of the purchased product."

      - name: seller_id
        description: "Unique identifier of the seller fulfilling the order item."

      - name: price
        description: "Price paid for the product, excluding freight."
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
              
      - name: freight_value
        description: "Shipping cost associated with the order item."
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
               