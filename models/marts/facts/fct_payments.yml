version: 2

models:
  - name: fct_payments
    description: >
      Fact table containing one record per payment transaction associated with
      an order.

      Grain:
      One row = one payment transaction within an order.

    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - order_id
              - payment_sequential

    columns:
      - name: order_id
        description: "Unique identifier of the order associated with this payment."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('fct_orders')
                field: order_id

      - name: payment_sequential
        description: "Sequential number of the payment transaction within the order."
        data_tests:
          - not_null

      - name: customer_id
        description: "Unique identifier of the customer who made the payment."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id

      - name: payment_type
        description: "Payment method used for the transaction (e.g., credit card, boleto, voucher)."
        data_tests:
          - not_null

      - name: payment_installments
        description: "Number of installments used to complete the payment transaction."
        data_tests:
          - not_null

      - name: order_status
        description: "Current lifecycle status of the associated order."

      - name: order_purchase_timestamp
        description: "Timestamp when the order was placed."

      - name: order_approved_at
        description: "Timestamp when the order was approved."

      - name: order_delivered_carrier_date
        description: "Timestamp when the order was handed over to the carrier."

      - name: order_delivered_customer_date
        description: "Timestamp when the customer received the order."

      - name: order_estimated_delivery_date
        description: "Estimated delivery date communicated to the customer."

      - name: payment_value
        description: "Monetary amount of the payment transaction."
        data_tests:
          - not_null