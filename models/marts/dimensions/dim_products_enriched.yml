version: 2

models:
  - name: dim_products_enriched
    description: "Product dimension enriched with sales metrics."

    columns:
      - name: product_id
        data_tests:
          - unique
          - not_null

      - name: units_sold
        description: "Number of units sold."

      - name: total_revenue
        description: "Revenue generated by the product."

      - name: order_count
        description: "Number of orders containing the product."

      - name: avg_selling_price
        description: "Average selling price of the product."

      - name: product_category_name
        description: "Category of the product."