version: 2

models:
  - name: int_product_sales
    description: "Product-level sales metrics derived from order items."

    columns:
      - name: product_id
        description: "Unique product identifier."
        data_tests:
          - unique
          - not_null

      - name: units_sold
        description: "Total units sold."

      - name: order_count
        description: "Distinct orders containing the product."

      - name: total_revenue
        description: "Total revenue generated by the product."

      - name: avg_selling_price
        description: "Average selling price."