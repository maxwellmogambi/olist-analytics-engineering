version: 2

models:
  - name: stg_payments
    description: "This model is a staging table for payments data."
    columns:
      - name: order_id
        description: "Unique identifier of the order associated with the payment."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_id
      - name: payment_sequential
        description: "Sequential number of the payment transaction within the order."
        data_tests:
          - not_null
      - name: payment_type
        description: "Type of the payment transaction."
      - name: payment_installments
        description: "Number of installments used to complete the payment transaction."
      - name: payment_value
        description: "Monetary amount of the payment transaction."
        data_tests:
          - not_null
